<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d5a3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bask</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --green-dark:#2d5a3d; --green:#3f7a52; --green-light:#e4eede;
  --cream:#f7f3e8; --cream-dark:#efe8d5; --ink:#2b2b23; --ink-soft:#6b6b58;
  --terracotta:#c2683f; --gold:#c9a227; --card:#fffdf7; --line:#ddd5bf;
  --radius:14px; --shadow:0 2px 8px rgba(43,43,35,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Georgia,'Times New Roman',serif;background:var(--cream);color:var(--ink);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}
button,input,select,textarea{font-family:inherit;font-size:1rem}
header{background:var(--green-dark);color:var(--cream);padding:14px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:1000}
header h1{font-size:1.25rem;font-weight:normal;font-style:italic;letter-spacing:.5px}
header h1 span{font-style:normal;font-size:.75rem;opacity:.75;display:block;letter-spacing:1px}
.lang-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);
  color:var(--cream);border-radius:20px;padding:5px 12px;font-size:.85rem;cursor:pointer}
main{padding-bottom:74px;min-height:calc(100% - 60px)}
.view{display:none;padding:16px;max-width:640px;margin:0 auto}
.view.active{display:block}
.view h2{font-size:1.15rem;color:var(--green-dark);margin-bottom:4px;
  border-bottom:2px solid var(--line);padding-bottom:6px}
.view .sub{font-size:.85rem;color:var(--ink-soft);margin-bottom:14px;font-style:italic}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--line);display:flex;z-index:1000;
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;padding:8px 2px 6px;cursor:pointer;
  color:var(--ink-soft);font-size:.62rem;display:flex;flex-direction:column;
  align-items:center;gap:2px;line-height:1.1}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--green-dark);font-weight:bold}
.nav-badge{position:absolute;top:2px;right:calc(50% - 20px);background:var(--terracotta);color:#fff;font-size:.6rem;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-weight:bold}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.empty{color:var(--ink-soft);font-style:italic;text-align:center;padding:34px 20px;
  border:1.5px dashed var(--line);border-radius:var(--radius);margin-top:10px}
.avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;border:2px solid rgba(0,0,0,.12)}
.avatar svg{width:32px;height:32px}
.avatar.sm{width:38px;height:38px}.avatar.sm svg{width:23px;height:23px}
.tl-item{display:flex;gap:12px;align-items:flex-start}
.tl-date{font-size:.72rem;color:var(--ink-soft);letter-spacing:.4px;text-transform:uppercase}
.tl-name{font-weight:bold;color:var(--green-dark)}
.tl-latin{font-style:italic;font-size:.82rem;color:var(--ink-soft)}
.tl-note{font-size:.88rem;margin-top:4px}
.tl-photo{width:100%;border-radius:10px;margin-top:8px;max-height:260px;object-fit:cover}
.tl-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:.7rem;background:var(--green-light);color:var(--green-dark);
  border-radius:20px;padding:2px 9px}
.chip.pub{background:#fdeedd;color:var(--terracotta)}
.del-btn{background:none;border:none;color:#b0503a;font-size:.75rem;cursor:pointer;
  margin-left:auto;text-decoration:underline}
#map{height:calc(100vh - 235px);min-height:320px;border-radius:var(--radius);
  border:1px solid var(--line);z-index:1}
.map-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.toggle{display:flex;align-items:center;gap:6px;font-size:.8rem;background:var(--card);
  border:1px solid var(--line);border-radius:20px;padding:5px 11px;cursor:pointer;user-select:none}
.toggle input{accent-color:var(--green-dark)}
.legend{font-size:.75rem;color:var(--ink-soft);margin-top:8px;display:flex;gap:14px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
label.fld{display:block;font-size:.8rem;color:var(--green-dark);font-weight:bold;
  margin:14px 0 5px;letter-spacing:.3px;text-transform:uppercase}
input[type=text],input[type=email],input[type=password],input[type=datetime-local],select,textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
textarea{resize:vertical;min-height:64px}
.species-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.sp-opt{border:1.5px solid var(--line);border-radius:12px;background:var(--card);padding:10px 4px;
  text-align:center;cursor:pointer;font-size:.72rem;line-height:1.15;display:flex;
  flex-direction:column;align-items:center;gap:5px}
.sp-opt.sel{border-color:var(--green-dark);background:var(--green-light);font-weight:bold}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;
  border-radius:12px;padding:12px 18px;font-size:1rem;cursor:pointer}
.btn-primary{background:var(--green-dark);color:var(--cream);width:100%;margin-top:20px}
.btn-secondary{background:var(--card);border:1.5px solid var(--green-dark);
  color:var(--green-dark);font-size:.85rem;padding:9px 14px}
.btn:disabled{opacity:.5}
#locStatus{font-size:.8rem;color:var(--ink-soft);margin-top:6px;font-style:italic}
#miniMap{height:200px;border-radius:10px;border:1px solid var(--line);margin-top:8px;z-index:1}
#photoPreview{width:100%;max-height:240px;object-fit:cover;border-radius:10px;margin-top:8px;display:none}
.photo-row{display:flex;gap:8px;margin-top:6px}
.pub-row{display:flex;align-items:center;gap:10px;margin-top:16px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:.88rem}
.pub-row input{accent-color:var(--green-dark);width:18px;height:18px;flex-shrink:0}
.guide-item{display:flex;gap:12px;align-items:center;cursor:pointer}
.guide-detail{font-size:.86rem;margin-top:10px;display:none;border-top:1px dashed var(--line);padding-top:10px}
.guide-detail.open{display:block}
.guide-detail dt{font-weight:bold;color:var(--green-dark);font-size:.72rem;
  text-transform:uppercase;letter-spacing:.4px;margin-top:7px}
.guide-detail dd{margin:1px 0 0}
.status-lc{color:#3f7a52;font-weight:bold}
.seen-mark{margin-left:auto;font-size:.72rem;color:var(--gold);font-weight:bold;text-align:right}
.seen-badge{margin-left:auto;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-weight:bold;font-size:.95rem;flex-shrink:0;box-shadow:var(--shadow)}
.seen-badge.house{background:radial-gradient(circle at 35% 30%,#e8d48b,var(--gold));color:#5c4a08;font-size:1rem}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.badge{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 6px;text-align:center;font-size:.7rem;line-height:1.2}
.badge .medal{width:52px;height:52px;border-radius:50%;margin:0 auto 7px;display:flex;
  align-items:center;justify-content:center;font-size:1.35rem;
  background:radial-gradient(circle at 35% 30%,#e8d48b,var(--gold));
  border:2.5px solid #a8871d;color:#5c4a08}
.badge.locked{opacity:.45;filter:grayscale(1)}
.badge .bname{font-weight:bold;color:var(--green-dark)}
.badge .bdate{color:var(--ink-soft);font-size:.62rem;margin-top:2px}
.stat-row{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  text-align:center;padding:12px 4px}
.stat b{display:block;font-size:1.5rem;color:var(--green-dark)}
.stat span{font-size:.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px}
.note{font-size:.78rem;color:var(--ink-soft);background:var(--cream-dark);
  border-radius:10px;padding:10px 12px;margin-top:10px;line-height:1.45}
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--green-dark);color:var(--cream);padding:11px 20px;border-radius:24px;
  font-size:.88rem;opacity:0;pointer-events:none;transition:.3s;z-index:2000;
  max-width:88vw;text-align:center;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.leaflet-container{font-family:inherit}
.popup-bird{font-weight:bold;color:var(--green-dark)}
.popup-sub{font-size:.78rem;color:var(--ink-soft)}
/* auth overlay */
#authView{position:fixed;inset:0;background:var(--cream);z-index:1500;display:none;
  overflow-y:auto;padding:0 16px 40px}
#authView.show{display:block}
.auth-box{max-width:420px;margin:0 auto}
.auth-logo{text-align:center;margin:48px 0 8px;font-size:2rem;font-style:italic;color:var(--green-dark)}
.auth-tag{text-align:center;font-size:.8rem;letter-spacing:2px;color:var(--ink-soft);
  text-transform:uppercase;margin-bottom:28px}
.auth-err{color:#b0503a;font-size:.85rem;margin-top:10px;min-height:1.2em}
.auth-alt{text-align:center;margin-top:16px;font-size:.85rem;color:var(--ink-soft)}
.auth-alt a{color:var(--green-dark);cursor:pointer;text-decoration:underline}
.auth-lang{position:absolute;top:14px;right:14px}
#appShell{display:none}
#appShell.show{display:block}
/* crop modal */
#cropModal{position:fixed;inset:0;background:rgba(25,28,20,.93);z-index:3000;display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:16px}
#cropModal.show{display:flex}
#cropStage{position:relative;touch-action:none}
#cropImg{display:block;max-width:92vw;max-height:58vh;user-select:none;-webkit-user-drag:none;border-radius:6px}
#cropBox{position:absolute;border:2px dashed #fff;cursor:move;touch-action:none;
  box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
#cropHandle{position:absolute;right:-14px;bottom:-14px;width:28px;height:28px;border-radius:50%;
  background:var(--gold);border:2.5px solid #fff;cursor:nwse-resize;touch-action:none}
.crop-hint{color:#f7f3e8;font-size:.8rem;margin-top:12px;font-style:italic;text-align:center}
body.no-scroll{overflow:hidden!important;overscroll-behavior:none;touch-action:none}
.crop-btns .btn-secondary{background:rgba(255,255,255,.18)!important;color:#fff!important;border-color:#fff!important;font-weight:bold}
.crop-btns .btn-primary{background:var(--gold)!important;color:#3a2f0c!important;font-weight:bold}
.crop-btns{display:flex;gap:10px;margin-top:14px}
.crop-btns .btn{padding:10px 22px}
/* lightbox */
#lightbox{position:fixed;inset:0;background:rgba(20,22,16,.94);z-index:3500;display:none;
  align-items:center;justify-content:center;padding:14px;cursor:zoom-out}
#lightbox.show{display:flex}
#lightbox img{max-width:96vw;max-height:92vh;border-radius:8px}
.tl-photo,.pop-thumb{cursor:zoom-in}
#matModal{position:fixed;inset:0;background:rgba(20,22,16,.5);z-index:3200;display:none;align-items:flex-end;justify-content:center}
#matModal.show{display:flex}
.mat-sheet{background:var(--cream);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:16px 16px 34px;box-shadow:0 -4px 20px rgba(0,0,0,.25)}
.mat-close{float:right;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--ink-soft);line-height:1}
.species-chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 14px}
.mf-indicator{display:flex;align-items:center;gap:8px;border-radius:12px;padding:9px 12px;margin-top:8px;font-size:.85rem;line-height:1.3}
.mf-on{background:var(--green-light);color:var(--green-dark);border:1px solid var(--green)}
.mf-off{background:#efe8d5;color:var(--ink-soft);border:1px solid var(--line)}
#homeMap{height:200px;border-radius:10px;border:1px solid var(--line);margin-top:8px;z-index:1}
#iconModal,#camModal,#successModal{position:fixed;inset:0;z-index:3400;display:none}
#iconModal.show,#camModal.show{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;background:rgba(25,28,20,.93)}
#iconBox{position:absolute;border:2px solid #fff;cursor:move;touch-action:none;box-shadow:0 0 0 9999px rgba(0,0,0,.55);border-radius:50%}
#iconHandle{position:absolute;right:-14px;bottom:-14px;width:28px;height:28px;border-radius:50%;background:var(--gold);border:2.5px solid #fff;cursor:nwse-resize;touch-action:none}
#successModal.show{display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(20,22,16,.5)}
#successContent{background:var(--cream);border-radius:16px;max-width:420px;width:100%;padding:20px 18px 22px;box-shadow:var(--shadow)}
</style>
</head>
<body>

<!-- AUTH -->
<section id="authView">
  <button class="lang-btn auth-lang" onclick="toggleLang()">Dansk</button>
  <div class="auth-box">
    <div class="auth-logo">Bask</div>
    <div class="auth-tag" data-i18n="tagline"></div>
    <div class="card">
      <label class="fld" style="margin-top:0" data-i18n="email"></label>
      <input type="email" id="authEmail" autocomplete="email">
      <label class="fld" data-i18n="password"></label>
      <input type="password" id="authPass" autocomplete="current-password">
      <div class="auth-err" id="authErr"></div>
      <button class="btn btn-primary" id="authMainBtn" onclick="doAuth()" data-i18n="logIn"></button>
      <div class="auth-alt" id="authAltRow">
        <span data-i18n="noAccount"></span> <a onclick="setAuthMode('signup')" data-i18n="signUp"></a>
      </div>
    </div>
  </div>
</section>

<!-- APP -->
<div id="appShell">
<header>
  <h1>Bask <span data-i18n="tagline"></span></h1>
  <button class="lang-btn" onclick="toggleLang()" id="langBtnHdr">Dansk</button>
</header>

<main>
  <section class="view active" id="view-observations">
    <h2 data-i18n="observations"></h2>
    <div class="photo-row" style="margin-top:8px;margin-bottom:14px">
      <button class="btn btn-primary" style="margin-top:0;flex:1" onclick="startCameraSighting()">📷 <span data-i18n="takePhoto"></span></button>
      <button class="btn btn-secondary" style="flex:1" onclick="startManualSighting()">✏️ <span data-i18n="addManually"></span></button>
    </div>
    <div id="timelineList"></div>
  </section>

  <section class="view" id="view-map">
    <h2 data-i18n="map"></h2>
    <p class="sub" data-i18n="mapSub"></p>
    <div class="map-controls">
      <label class="toggle"><input type="checkbox" id="cadToggle"> <span data-i18n="cadastral"></span></label>
      <label class="toggle"><input type="checkbox" id="commToggle" checked> <span data-i18n="community"></span></label>
      <label class="toggle"><input type="checkbox" id="matToggle" checked> <span data-i18n="matrikelLayer"></span></label>
      <button class="btn btn-secondary" style="padding:5px 11px;font-size:.8rem" onclick="centerOnMe()">📍 <span data-i18n="myLocation"></span></button>
    </div>
    <div id="map"></div>
    <div class="legend">
      <span><span class="dot" style="background:#2d5a3d"></span><span data-i18n="mySightings"></span></span>
      <span><span class="dot" style="background:#c2683f"></span><span data-i18n="otherSightings"></span></span>
    </div>
  </section>

  <section class="view" id="view-log">
    <h2 data-i18n="newSighting"></h2>
    <p class="sub" data-i18n="logSub"></p>
    <label class="fld" style="margin-top:6px" data-i18n="photoOptional"></label>
    <div class="photo-row" style="margin-top:0">
      <button class="btn btn-primary" style="margin-top:0;flex:1" onclick="document.getElementById('camInput').click()">📷 <span data-i18n="takePhoto"></span></button>
      <button class="btn btn-secondary" onclick="document.getElementById('galInput').click()">🖼️ <span data-i18n="fromGallery"></span></button>
    </div>
    <input type="file" id="camInput" accept="image/*" capture="environment" hidden>
    <input type="file" id="galInput" accept="image/*" hidden>
    <img id="photoPreview" alt="">
    <button class="btn btn-secondary" id="cropBtn" style="display:none;margin-top:8px" onclick="openCrop()">✂️ <span data-i18n="cropBtn"></span></button>
    <button class="btn btn-secondary" id="removePhotoBtn" style="display:none;margin-top:8px" onclick="removePhoto()" data-i18n="removePhoto"></button>
    <label class="fld" data-i18n="species"></label>
    <input type="text" id="speciesSearch" data-i18n-ph="searchSpecies" style="margin-bottom:8px" oninput="speciesFilter=this.value.trim();renderSpeciesGrid()">
    <div class="species-grid" id="speciesGrid"></div>
    <label class="fld" data-i18n="when"></label>
    <input type="datetime-local" id="logWhen">
    <label class="fld" data-i18n="where"></label>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <label id="mfRow" class="toggle" style="display:none"><input type="checkbox" id="mfToggle" onchange="mfToggleChanged(this.checked)"> <span data-i18n="matrikelfuglOpt"></span></label>
      <button class="btn btn-secondary" style="margin-left:auto" onclick="pinpointMe()">📍 <span data-i18n="useMyLocation"></span></button>
    </div>
    <div id="mfIndicator"></div>
    <div id="locStatus" data-i18n="locHint"></div>
    <div id="miniMap"></div>
    <label class="fld" data-i18n="notes"></label>
    <textarea id="logNotes"></textarea>
    <label class="pub-row"><input type="checkbox" id="logPublic" checked> <span data-i18n="sharePublic"></span></label>
    <button class="btn btn-primary" id="saveBtn" onclick="saveSighting()" data-i18n="save"></button>
    <button class="btn btn-secondary" id="cancelEdit" style="width:100%;margin-top:8px" onclick="cancelEditMode()" data-i18n="cancel"></button>
  </section>

  <section class="view" id="view-guide">
    <h2 data-i18n="guide"></h2>
    <p class="sub" id="guideSub"></p>
    <input type="text" id="guideSearch" data-i18n-ph="searchSpecies" style="margin-bottom:10px" oninput="guideSearchInput(this.value)">
    <div id="guideList"></div>
  </section>

  <section class="view" id="view-badges">
    <h2 data-i18n="badges"></h2>
    <p class="sub" data-i18n="badgesSub"></p>
    <h3 style="font-size:.9rem;color:var(--green-dark);margin:14px 0 8px" data-i18n="milestoneBadges"></h3>
    <div class="badge-grid" id="milestoneBadges"></div>
    <h3 style="font-size:.9rem;color:var(--green-dark);margin:18px 0 8px" data-i18n="orderBadges"></h3>
    <div class="badge-grid" id="orderBadges"></div>
    <h3 style="font-size:.9rem;color:var(--green-dark);margin:18px 0 8px" data-i18n="familyBadges"></h3>
    <div class="badge-grid" id="familyBadges"></div>
    <h3 style="font-size:.9rem;color:var(--green-dark);margin:18px 0 8px" data-i18n="speciesBadges"></h3>
    <div class="badge-grid" id="speciesBadges"></div>
  </section>

  <section class="view" id="view-profile">
    <h2 data-i18n="profile"></h2>
    <p class="sub" id="profEmail"></p>
    <div class="stat-row">
      <div class="stat"><b id="statSightings">0</b><span data-i18n="sightings"></span></div>
      <div class="stat"><b id="statSpecies">0</b><span data-i18n="uniqueSpecies"></span></div>
      <div class="stat"><b id="statBadges">0</b><span data-i18n="badgesEarned"></span></div>
    </div>
    <div class="card">
      <label class="fld" style="margin-top:0" data-i18n="displayName"></label>
      <input type="text" id="profName" placeholder="—">
      <button class="btn btn-secondary" style="margin-top:10px" onclick="saveProfile()" data-i18n="saveProfile"></button>
      <div class="note" data-i18n="cloudNote"></div>
    </div>
    <div class="card">
      <label class="fld" style="margin-top:0" data-i18n="homeMatrikel"></label>
      <div id="homeMatLabel" class="sub" style="margin:2px 0 6px"></div>
      <div id="homeMap"></div>
      <div class="photo-row" style="flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="homeUseLocation()">📍 <span data-i18n="useMyLocation"></span></button>
        <button class="btn btn-secondary" onclick="saveHomeMatrikel()" data-i18n="saveHome"></button>
        <button class="btn btn-secondary" onclick="clearHomeMatrikel()" data-i18n="clearHome"></button>
      </div>
      <div class="note" data-i18n="homeNote"></div>
    </div>
    <div class="card">
      <label class="fld" style="margin-top:0" data-i18n="dfToken"></label>
      <input type="text" id="dfToken" placeholder="Dataforsyningen token">
      <button class="btn btn-secondary" style="margin-top:10px" onclick="saveToken()" data-i18n="saveToken"></button>
      <div class="note" data-i18n="tokenNote"></div>
    </div>

function birdSVG(fill){
  return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path fill="${fill}" d="M14 40c-4-1-8-4-10-8 3 0 5 0 7-1-3-2-5-6-5-10 2 2 5 3 8 3 2-6 8-11 15-11 8 0 15 6 16 14l12-5-8 10c1 12-8 22-21 22-4 0-8-1-11-3l-8 5 3-8c-2-2-3-5-4-8z" transform="scale(.9) translate(4 4)"/></svg>`;
}
function iconUrl(birdId){
  const e = (typeof iconMap!=='undefined' ? iconMap : {})[birdId];
  if (!e || !user) return null;
  const v = (typeof e === 'object') ? e.v : e;
  return db.storage.from('photos').getPublicUrl(`${user.id}/icon_${birdId}.jpg`).data.publicUrl + '?v=' + v;
}
function avatarHTML(bird, cls){
  const u = iconUrl(bird.id);
  if (u) return `<div class="avatar ${cls||''}" style="overflow:hidden;padding:0"><img src="${u}" alt="" style="width:100%;height:100%;object-fit:cover"></div>`;
  return `<div class="avatar ${cls||''}" style="background:linear-gradient(135deg,${bird.c2}22,${bird.c1}44)">${birdSVG(bird.c1)}</div>`;
}

/* reverse-geocode a coordinate to the cadastral parcel (matrikel) it falls on */
async function reverseMatrikel(lat, lng){
  try {
    const r = await fetch(`https://api.dataforsyningen.dk/jordstykker/reverse?x=${lng}&y=${lat}&srid=4326&format=geojson`);
    if (!r.ok) return null;
    const g = await r.json();
    if (!g || !g.geometry || !g.properties) return null;
    const p = g.properties;
    return { id: p.ejerlavkode + '-' + p.matrikelnr,
             label: p.matrikelnr + (p.ejerlavnavn ? ', ' + p.ejerlavnavn : ''),
             geojson: JSON.stringify(g.geometry) };
  } catch(e){ return null; }
}
/* assign matrikel to any of the user's own sightings that don't have one yet */
async function backfillMatrikel(){
  const todo = sightings.filter(s => !s.matrikel_id && s.lat != null && s.lng != null);
  if (!todo.length) return;
  let changed = false;
  for (const s of todo){
    const m = await reverseMatrikel(s.lat, s.lng);
    if (!m) continue;
    const { error } = await db.from('sightings')
      .update({matrikel_id:m.id, matrikel_label:m.label, matrikel_geojson:m.geojson}).eq('id', s.id);
    if (!error){ s.matrikel_id=m.id; s.matrikel_label=m.label; s.matrikel_geojson=m.geojson; changed=true; }
  }
  if (changed){ renderTimeline(); refreshMapMarkers(); }
}

/* ===== home matrikel + matrikelfugl ===== */
var homeMatrikel = null, matrikelfuglActive = false, homeMap = null, homeMarker = null, homeMiniLayer = null;
var iconMap = {};
function pointInRing(x, y, ring){
  let inside = false;
  for (let i=0, j=ring.length-1; i<ring.length; j=i++){
    const xi=ring[i][0], yi=ring[i][1], xj=ring[j][0], yj=ring[j][1];
    if (((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}
function pointInPolygonCoords(x, y, polys){
  if (!polys.length || !pointInRing(x,y,polys[0])) return false;
  for (let k=1;k<polys.length;k++){ if (pointInRing(x,y,polys[k])) return false; }
  return true;
}
function pointInGeometry(lng, lat, geom){
  if (!geom) return false;
  if (geom.type==='Polygon') return pointInPolygonCoords(lng,lat,geom.coordinates);
  if (geom.type==='MultiPolygon') return geom.coordinates.some(pc=>pointInPolygonCoords(lng,lat,pc));
  return false;
}
function geomCentroid(geom){
  let ring;
  if (geom.type==='Polygon') ring=geom.coordinates[0];
  else if (geom.type==='MultiPolygon') ring=geom.coordinates[0][0];
  else return null;
  let x=0,y=0; for (const p of ring){ x+=p[0]; y+=p[1]; }
  return {lng:x/ring.length, lat:y/ring.length};
}
function homeGeo(){ try { return JSON.parse(homeMatrikel.geojson); } catch(e){ return null; } }
function homeCenter(){ const g=homeGeo(); return g?geomCentroid(g):null; }
function setupMatrikelfugl(){

function snapToHome(){

function onUserMovedPin(){

function updateMfUI(){

}
function drawHomeOnMini(){
  if(!miniMap||!homeMatrikel) return;
  if(homeMiniLayer){ miniMap.removeLayer(homeMiniLayer); homeMiniLayer=null; }
  const g=homeGeo(); if(!g) return;
  homeMiniLayer=L.geoJSON(g,{style:{color:'#2d5a3d',weight:2,fillColor:'#3f7a52',fillOpacity:.15,dashArray:'4'},interactive:false}).addTo(miniMap);
}
function initHomeMap(){
  setTimeout(()=>{
    if(!homeMap){
      homeMap=L.map('homeMap').setView([56.0,10.5],6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',attribution:'© OpenStreetMap · © CARTO'}).addTo(homeMap);
      homeMap.on('click', e=> setHomeMarker(e.latlng.lat, e.latlng.lng));
    }
    homeMap.invalidateSize();
    if(homeMatrikel){ const c=homeCenter(); if(c){ setHomeMarker(c.lat,c.lng); homeMap.setView([c.lat,c.lng],17); } }
  },60);
}
function setHomeMarker(lat,lng){
  if(homeMarker) homeMarker.setLatLng([lat,lng]);
  else homeMarker=L.marker([lat,lng],{draggable:true}).addTo(homeMap);
  homeMap.__lat=lat; homeMap.__lng=lng;
  homeMarker.off('dragend'); homeMarker.on('dragend',()=>{ const p=homeMarker.getLatLng(); homeMap.__lat=p.lat; homeMap.__lng=p.lng; });
}
function homeUseLocation(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p=>{ setHomeMarker(p.coords.latitude,p.coords.longitude); homeMap.setView([p.coords.latitude,p.coords.longitude],17); },
    ()=>toast(t('locErr')), {enableHighAccuracy:true,timeout:10000});
}
async function saveHomeMatrikel(){

/* retroactively flag the user's own sightings as matrikelfugl when their matrikel == home (diff-only writes) */
async function reconcileMatrikelfugl(){
  if(!user) return;
  const toTrue=[], toFalse=[];
  sightings.forEach(s=>{
    const should = !!(homeMatrikel && s.matrikel_id && s.matrikel_id===homeMatrikel.id);
    if(should && !s.is_matrikelfugl) toTrue.push(s);
    else if(!should && s.is_matrikelfugl) toFalse.push(s);
  });
  if(!toTrue.length && !toFalse.length) return;
  try {
    if(toTrue.length) await db.from('sightings').update({is_matrikelfugl:true}).in('id', toTrue.map(s=>s.id));
    if(toFalse.length) await db.from('sightings').update({is_matrikelfugl:false}).in('id', toFalse.map(s=>s.id));
    toTrue.forEach(s=>s.is_matrikelfugl=true); toFalse.forEach(s=>s.is_matrikelfugl=false);
    renderTimeline(); refreshMapMarkers();
  } catch(e){}
}

/* ===== custom species icons from user photos ===== */
var iconCropBird=null, iconCropPhoto=null;
const iconBoxState={x:0,y:0,s:100};
let iconDrag=null;
function setIconBox(x,y,s){
  const img=document.getElementById('iconImg'); const W=img.clientWidth,H=img.clientHeight;
  s=Math.max(40,Math.min(s,Math.min(W,H)));
  x=Math.max(0,Math.min(x,W-s)); y=Math.max(0,Math.min(y,H-s));
  Object.assign(iconBoxState,{x,y,s});
  const bx=document.getElementById('iconBox');
  bx.style.left=x+'px'; bx.style.top=y+'px'; bx.style.width=s+'px'; bx.style.height=s+'px';
}
function lockScroll(on){ document.body.classList.toggle('no-scroll', !!on); }
function openIconCrop(srcDataUrl, birdId, sourcePhotoPath){
  iconCropBird=birdId; iconCropPhoto=sourcePhotoPath||null;
  const img=document.getElementById('iconImg');
  document.getElementById('iconModal').classList.add('show'); lockScroll(true);
  const place=()=>{ const W=img.clientWidth,H=img.clientHeight; const s=Math.min(W,H)*0.8; setIconBox((W-s)/2,(H-s)/2,s); };
  if(img.src===srcDataUrl && img.complete) place(); else { img.onload=place; img.src=srcDataUrl; }
}
function closeIconCrop(){ document.getElementById('iconModal').classList.remove('show'); lockScroll(false); }
async function applyIconCrop(){
  const img=document.getElementById('iconImg'); const sc=img.naturalWidth/img.clientWidth;
  const size=256, c=document.createElement('canvas'); c.width=size; c.height=size;
  c.getContext('2d').drawImage(img, iconBoxState.x*sc, iconBoxState.y*sc, iconBoxState.s*sc, iconBoxState.s*sc, 0,0,size,size);
  const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',.85));
  if(!blob || !user || !iconCropBird){ closeIconCrop(); return; }
  const uid=user.id, ipath=`${uid}/icon_${iconCropBird}.jpg`;
  try { await db.storage.from('photos').remove([ipath]); } catch(e){}
  const up=await db.storage.from('photos').upload(ipath, blob, {contentType:'image/jpeg', upsert:true});
  if(up.error){ toast(up.error.message||'error'); return; }
  iconMap[iconCropBird]={v:Date.now(), photo: iconCropPhoto||null};
  await db.from('profiles').update({species_icons: iconMap}).eq('id', uid);
  closeIconCrop();
  renderTimeline(); renderGuide(); renderSpeciesGrid(); if(map) refreshMapMarkers();
  toast(t('iconSaved'));
}
(function initIconDrag(){
  const box=document.getElementById('iconBox'), handle=document.getElementById('iconHandle');
  const start=mode=>e=>{ e.preventDefault(); e.stopPropagation(); iconDrag=Object.assign({mode,px:e.clientX,py:e.clientY}, iconBoxState); if(e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId); };
  handle.addEventListener('pointerdown', start('resize'));
  box.addEventListener('pointerdown', e=>{ if(e.target===box) start('move')(e); });
  document.addEventListener('pointermove', e=>{ if(!iconDrag) return; e.preventDefault(); const dx=e.clientX-iconDrag.px, dy=e.clientY-iconDrag.py; if(iconDrag.mode==='move') setIconBox(iconDrag.x+dx, iconDrag.y+dy, iconDrag.s); else setIconBox(iconDrag.x, iconDrag.y, iconDrag.s+Math.max(dx,dy)); });
  document.addEventListener('pointerup', ()=>{ iconDrag=null; });
})();
async function iconFromSighting(id){
  const s=sightings.find(x=>x.id===id); if(!s||!s.photo_path) return;
  try{
    const blob=await fetch(photoUrl(s.photo_path)).then(r=>r.blob());
    const dataUrl=await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(blob); });
    openIconCrop(dataUrl, s.bird_id, s.photo_path);
  }catch(e){ toast(t('iconLoadErr')); }
}

function showSuccess(birdId, photoDataUrl, newBadges, photoPath){

/* build a small thumbnail Blob from a full-size data URL (keeps map/timeline egress low) */
function makeThumbBlob(dataUrl, size){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const sc = Math.min(1, size / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * sc); c.height = Math.round(img.height * sc);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(b => res(b), 'image/jpeg', .72);
    };
    img.src = dataUrl;
  });
}
/* photo thumbnail markup: loads the small thumb, falls back to full if no thumb exists
   (e.g. sightings logged before this feature), taps open the full image in a lightbox */

  const thumb = thumbUrl(path), full = photoUrl(path);
  return `<img class="${cls}" src="${thumb}" alt="${alt||''}" loading="lazy"
    onclick="openLightbox('${full}')"
    onerror="this.onerror=null;this.src='${full}'">`;
}

/* ---- photo crop ---- */
const cropBoxState = {x:0, y:0, w:100, h:100};
let cropDrag = null;
function setCropBox(x, y, w, h){
  const img = document.getElementById('cropImg');
  const W = img.clientWidth, H = img.clientHeight;
  w = Math.max(40, Math.min(w, W)); h = Math.max(40, Math.min(h, H));
  x = Math.max(0, Math.min(x, W - w)); y = Math.max(0, Math.min(y, H - h));
  Object.assign(cropBoxState, {x, y, w, h});
  const bx = document.getElementById('cropBox');
  bx.style.left = x + 'px'; bx.style.top = y + 'px';
  bx.style.width = w + 'px'; bx.style.height = h + 'px';
}
function openCrop(){
  if (!logPhotoOriginal) return;
  const img = document.getElementById('cropImg');
  document.getElementById('cropModal').classList.add('show'); lockScroll(true);
  const place = () => {
    const W = img.clientWidth, H = img.clientHeight;
    const s = Math.min(W, H) * 0.7;
    setCropBox((W - s) / 2, (H - s) / 2, s, s);
  };
  if (img.src === logPhotoOriginal && img.complete) place();
  else { img.onload = place; img.src = logPhotoOriginal; }
}
function closeCrop(){ document.getElementById('cropModal').classList.remove('show'); lockScroll(false); }
function applyCrop(){
  const img = document.getElementById('cropImg');
  const sc = img.naturalWidth / img.clientWidth;
  const c = document.createElement('canvas');
  c.width = Math.round(cropBoxState.w * sc); c.height = Math.round(cropBoxState.h * sc);
  c.getContext('2d').drawImage(img,
    Math.round(cropBoxState.x * sc), Math.round(cropBoxState.y * sc), c.width, c.height,
    0, 0, c.width, c.height);
  logPhoto = c.toDataURL('image/jpeg', .85);
  const pv = document.getElementById('photoPreview');
  pv.src = logPhoto; pv.style.display = 'block';
  closeCrop(); toast('✂️ ✓');
}
(function initCropDrag(){
  const box = document.getElementById('cropBox');
  const handle = document.getElementById('cropHandle');
  const start = mode => e => {
    e.preventDefault(); e.stopPropagation();
    cropDrag = {mode, px: e.clientX, py: e.clientY, ...cropBoxState};
    (e.target).setPointerCapture && e.target.setPointerCapture(e.pointerId);
  };
  handle.addEventListener('pointerdown', start('resize'));
  box.addEventListener('pointerdown', e => { if (e.target === box) start('move')(e); });
  document.addEventListener('pointermove', e => {
    if (!cropDrag) return;
    const dx = e.clientX - cropDrag.px, dy = e.clientY - cropDrag.py;
    if (cropDrag.mode === 'move') setCropBox(cropDrag.x + dx, cropDrag.y + dy, cropDrag.w, cropDrag.h);
    else setCropBox(cropDrag.x, cropDrag.y, cropDrag.w + dx, cropDrag.h + dy);
  });
  document.addEventListener('pointerup', () => { cropDrag = null; });
})();

function dataUrlToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(',');
  const mime = meta.match(/data:([^;]+)/)[1];
  const bin = atob(b64), arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

  if (!selectedBird) return toast(t('needSpecies'));
  if (!logLatLng) return toast(t('needLocation'));
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = t('saving');
  try {
    const whenVal = document.getElementById('logWhen').value;
    const base = {
      bird_id: selectedBird,
      seen_at: (whenVal ? new Date(whenVal) : new Date()).toISOString(),
      lat: logLatLng.lat, lng: logLatLng.lng,
      notes: document.getElementById('logNotes').value.trim() || null,
      is_public: document.getElementById('logPublic').checked
    };
    const isEdit = !!editingId;
    let saved;
    if (isEdit){
      const { data, error } = await db.from('sightings').update(base).eq('id', editingId).select().single();
      if (error) throw error; saved = data;
    } else {
      const { data, error } = await db.from('sightings').insert({...base, user_id: user.id}).select().single();
      if (error) throw error; saved = data;
    }
    if (logPhoto){
      const path = `${user.id}/${saved.id}.jpg`;
      const up = await db.storage.from('photos').upload(path, dataUrlToBlob(logPhoto), {contentType:'image/jpeg', upsert:true});
      if (!up.error){
        const thumbBlob = await makeThumbBlob(logPhoto, 320);
        if (thumbBlob) await db.storage.from('photos').upload(`${user.id}/${saved.id}_thumb.jpg`, thumbBlob, {contentType:'image/jpeg', upsert:true});
        const upd = await db.from('sightings').update({photo_path: path}).eq('id', saved.id).select().single();
        if (upd.data) saved = upd.data;
      }
    } else if (isEdit && removePhotoFlag && editPhotoPath){
      try { await db.storage.from('photos').remove([editPhotoPath, editPhotoPath.replace(/\.jpg$/i,'_thumb.jpg')]); } catch(e){}
      const upd = await db.from('sightings').update({photo_path: null}).eq('id', saved.id).select().single();
      if (upd.data) saved = upd.data;
    }
    let mat = await reverseMatrikel(saved.lat, saved.lng);
    const mf = !!(matrikelfuglActive && homeMatrikel);
    if (mf) mat = { id: homeMatrikel.id, label: homeMatrikel.label, geojson: homeMatrikel.geojson };
    {
      const upd = mat ? {matrikel_id:mat.id, matrikel_label:mat.label, matrikel_geojson:mat.geojson, is_matrikelfugl:mf}
                      : {matrikel_id:null, matrikel_label:null, matrikel_geojson:null, is_matrikelfugl:mf};
      let um = await db.from('sightings').update(upd).eq('id', saved.id).select().single();
      if (um.error && ('is_matrikelfugl' in upd)){ delete upd.is_matrikelfugl; um = await db.from('sightings').update(upd).eq('id', saved.id).select().single(); }
      if (um.data) saved = um.data;
    }
    if (isEdit){ const ix=sightings.findIndex(s=>s.id===saved.id); if(ix>=0) sightings[ix]=saved; sightings.sort((a,b)=>(b.seen_at||'').localeCompare(a.seen_at||'')); }
    else sightings.unshift(saved);
    const newBadges = await checkBadges();
    await reconcileIcons();
    const savedBird = selectedBird, savedPhoto = logPhoto, savedPhotoPath = saved.photo_path;
    editingId = null; editPhotoPath = null;
    selectedBird = null; logPhoto = null; logPhotoOriginal = null;
    speciesFilter = ''; document.getElementById('speciesSearch').value = '';
    document.getElementById('logNotes').value = '';
    const pv = document.getElementById('photoPreview'); pv.style.display = 'none';
    document.getElementById('cropBtn').style.display = 'none';
    document.getElementById('removePhotoBtn').style.display = 'none'; removePhotoFlag = false;
    document.getElementById('camInput').value = ''; document.getElementById('galInput').value = '';
    document.getElementById('cancelEdit').style.display = 'none';
    renderSpeciesGrid(); setNow(); renderTimeline(); refreshMapMarkers(); updateStats();
    showView('observations');
    if (savedPhoto) showSuccess(savedBird, savedPhoto, newBadges, savedPhotoPath);
    else toast(isEdit ? t('updated') : (newBadges.length ? `${t('saved')} 🏅 ${t('badgeUnlocked')} ${newBadges.join(', ')}` : t('saved')));
  } catch(e){ toast((e && e.message) || String(e)); }
  finally { btn.disabled = false; btn.textContent = editingId ? t('update') : t('save'); }
}
function editSighting(id){
  const s=sightings.find(x=>x.id===id); if(!s) return;
  editingId=id; editPhotoPath=s.photo_path||null;
  selectedBird=s.bird_id; logLatLng={lat:s.lat, lng:s.lng};
  logPhoto=null; logPhotoOriginal=null;
  showView('log');

}

/* ============ badges ============ */
const MILE_STEPS = [[1,'🐣'],[5,'🪶'],[10,'🥉'],[25,'🥈'],[50,'🥇'],[100,'🏅'],[150,'🎖️'],[200,'👑']];
const MILESTONES = MILE_STEPS.map(([n, icon]) => ({
  id:'m'+n, n, icon,
  name:() => n === 1 ? t('bFirst') : n + ' ' + t('bSpecies'),
  desc:() => n === 1 ? t('bDesc1') : t('bDescN').replace('%n', n)
}));
function statusColor(code){ return {LC:'#3f7a52',NT:'#b0952f',VU:'#c2683f',EN:'#c0392b',CR:'#8e1b1b',DD:'#6b6b58'}[code] || '#6b6b58'; }
function uniqueSpeciesSeen(){ return [...new Set(sightings.map(s => s.bird_id))]; }
/* earned badges keyed to the qualifying sighting's user-entered date (seen_at), not the log time */
function computeEarnedBadges(){
  const firstSeen={};
  sightings.forEach(s=>{ const tt=s.seen_at; if(tt && (!firstSeen[s.bird_id] || tt < firstSeen[s.bird_id])) firstSeen[s.bird_id]=tt; });
  const speciesList=Object.keys(firstSeen);
  const earned={};
  speciesList.forEach(id=>{ earned['sp_'+id]=firstSeen[id]; });
  const famFirst={}, ordFirst={};
  speciesList.forEach(id=>{ const f=BIRD_FAM[id]; if(!f) return;
    if(!famFirst[f]||firstSeen[id]<famFirst[f]) famFirst[f]=firstSeen[id];
    const o=FAM2ORD[f]; if(o && (!ordFirst[o]||firstSeen[id]<ordFirst[o])) ordFirst[o]=firstSeen[id]; });
  Object.keys(famFirst).forEach(f=>earned['fam_'+f]=famFirst[f]);
  Object.keys(ordFirst).forEach(o=>earned['ord_'+o]=ordFirst[o]);
  const sortedDates=speciesList.map(id=>firstSeen[id]).sort();
  MILESTONES.forEach(m=>{ if(speciesList.length>=m.n) earned[m.id]=sortedDates[m.n-1]; });
  return earned;
}
function badgeName(k){
  if(k.indexOf('sp_')===0){ const b=birdById(k.slice(3)); return b?b.name[lang]:k; }
  if(k.indexOf('fam_')===0){ const f=k.slice(4); return (FAMILIES[f]&&FAMILIES[f][lang])||f; }
  if(k.indexOf('ord_')===0){ const o=k.slice(4); return (ORDERS[o]&&ORDERS[o][lang])||o; }
  const m=MILESTONES.find(x=>x.id===k); return m?m.name():k;
}
/* recompute all badges from current sightings; upsert changed, delete revoked; returns newly-earned names */
async function checkBadges(){
  if(!user) return [];
  const earned=computeEarnedBadges();
  const prev=unlockedBadges||{};
  const newlyIds=Object.keys(earned).filter(k=>!(k in prev));
  const upserts=[], deletes=[];
  Object.keys(earned).forEach(k=>{ if(prev[k]!==earned[k]) upserts.push({user_id:user.id, badge_id:k, unlocked_at:earned[k]}); });
  Object.keys(prev).forEach(k=>{ if(!(k in earned)) deletes.push(k); });
  unlockedBadges=earned;
  try{
    if(upserts.length) await db.from('user_badges').upsert(upserts);
    if(deletes.length) await db.from('user_badges').delete().eq('user_id',user.id).in('badge_id',deletes);
  }catch(e){}
  renderBadges();
  return newlyIds.map(badgeName);
}
/* remove custom icons whose species has no photographed sighting left */
async function reconcileIcons(){
  if(!user) return;
  const photoSpecies=new Set(sightings.filter(s=>s.photo_path).map(s=>s.bird_id));
  const toRemove=Object.keys(iconMap||{}).filter(bid=>!photoSpecies.has(bid));
  if(!toRemove.length) return;
  for(const bid of toRemove){ try{ await db.storage.from('photos').remove([`${user.id}/icon_${bid}.jpg`]); }catch(e){} delete iconMap[bid]; }
  try{ await db.from('profiles').update({species_icons: iconMap}).eq('id', user.id); }catch(e){}
  renderTimeline(); renderGuide(); renderSpeciesGrid(); if(map) refreshMapMarkers();
}
async function reconcileBadges(){
  const seen = uniqueSpeciesSeen();
  const fams = new Set(seen.map(id => BIRD_FAM[id]).filter(Boolean));
  const ords = new Set([...fams].map(f => FAM2ORD[f]).filter(Boolean));
  const valid = new Set();
  seen.forEach(id => valid.add('sp_'+id));
  MILESTONES.forEach(m => { if (seen.length >= m.n) valid.add(m.id); });
  fams.forEach(f => valid.add('fam_'+f));
  ords.forEach(o => valid.add('ord_'+o));
  const revoke = Object.keys(unlockedBadges).filter(k => !valid.has(k));
  if (revoke.length){
    await db.from('user_badges').delete().eq('user_id', user.id).in('badge_id', revoke);
    revoke.forEach(k => delete unlockedBadges[k]);
  }
  renderBadges();
}
function renderBadges(){
  const mEl = document.getElementById('milestoneBadges'); if (!mEl) return;
  mEl.innerHTML = MILESTONES.map(m => {
    const u = unlockedBadges[m.id];
    return `<div class="badge ${u?'':'locked'}"><div class="medal">${m.icon}</div>
      <div class="bname">${m.name()}</div><div>${m.desc()}</div>
      ${u ? `<div class="bdate">${fmtDate(u)}</div>` : ''}</div>`;
  }).join('');
  const taxaBadge = (unlockedKey, icon, title, sub) => {
    const u = unlockedBadges[unlockedKey];
    return `<div class="badge ${u?'':'locked'}"><div class="medal" style="font-size:1.15rem">${icon}</div>
      <div class="bname">${title}</div>
      <div class="bdate">${sub}</div>
      ${u ? `<div class="bdate">${fmtDate(u)}</div>` : ''}</div>`;
  };
  document.getElementById('orderBadges').innerHTML = Object.keys(ORDERS)
    .sort((a,b)=>(unlockedBadges['ord_'+a]?0:1)-(unlockedBadges['ord_'+b]?0:1)).map(o =>
    taxaBadge('ord_'+o, '🧭', (ORDERS[o][lang]||o), o)).join('');
  document.getElementById('familyBadges').innerHTML = Object.keys(FAMILIES)
    .sort((a,b)=>(unlockedBadges['fam_'+a]?0:1)-(unlockedBadges['fam_'+b]?0:1)).map(f =>
    taxaBadge('fam_'+f, '🪺', (FAMILIES[f][lang]||f), f)).join('');
  document.getElementById('speciesBadges').innerHTML = [...BIRDS]
    .sort((a,b)=>(unlockedBadges['sp_'+a.id]?0:1)-(unlockedBadges['sp_'+b.id]?0:1)).map(b => {
    const u = unlockedBadges['sp_'+b.id];
    return `<div class="badge ${u?'':'locked'}">
      <div class="medal" style="background:radial-gradient(circle at 35% 30%,${b.c1}66,${b.c1})">${birdSVG('#fff')}</div>
      <div class="bname">${b.name[lang]}</div>
      <div class="bdate">${u ? t('firstSeen')+': '+fmtDate(u) : t('notSeen')}</div></div>`;
  }).join('');
}

/* ============ field guide ============ */
let guideFilter = '';
let guideDebounce = null;
function guideSearchInput(v){ guideFilter = (v||'').trim(); clearTimeout(guideDebounce); guideDebounce = setTimeout(renderGuide, 200); }
function renderGuide(){
  const el = document.getElementById('guideList'); if (!el) return;
  const gs = document.getElementById('guideSub'); if (gs) gs.textContent = t('guideSub').replace('%n', BIRDS.length);
  const seenSet = new Set(uniqueSpeciesSeen());
  const mfSet = new Set(sightings.filter(s => s.is_matrikelfugl).map(s => s.bird_id));
  const rank = id => mfSet.has(id) ? 2 : seenSet.has(id) ? 1 : 0;
  const q = foldText(guideFilter);
  const list = BIRDS.filter(b => !q || foldText(b.name.en + ' ' + b.name.da + ' ' + b.latin).includes(q))
    .slice().sort((a, b) => rank(b.id) - rank(a.id));
  el.innerHTML = (list.length ? list.map(b => `
    <div class="card">
      <div class="guide-item" onclick="this.nextElementSibling.classList.toggle('open')">
        ${iconMap[b.id] ? `<span onclick="event.stopPropagation();viewBirdIcon('${b.id}')" style="cursor:zoom-in">${avatarHTML(b)}</span>` : avatarHTML(b)}
        <div><div class="tl-name">${b.name[lang]}</div><div class="tl-latin">${b.latin}</div></div>
        ${mfSet.has(b.id) ? `<div class="seen-badge house" title="${t('seenProperty')}">🏡</div>` : seenSet.has(b.id) ? `<div class="seen-badge" title="${t('seen')}">✓</div>` : ''}
      </div>
      <dl class="guide-detail">
        <dt>${t('latinName')}</dt><dd><i>${b.latin}</i></dd>
        <dt>${t('orderLbl')}</dt><dd>${ordInfo(b).name} <span style="color:var(--ink-soft)">(${ordInfo(b).latin})</span></dd>
        <dt>${t('familyLbl')}</dt><dd>${famInfo(b).name} <span style="color:var(--ink-soft)">(${famInfo(b).latin})</span></dd>
        <dt>${t('sizeLbl')}</dt><dd>${b.size}</dd>
        <dt>${t('statusLbl')}</dt><dd style="font-weight:bold;color:${statusColor(b.status)}">● ${t('st'+b.status)} (${b.status})</dd>
        <dt>${t('habitatLbl')}</dt><dd>${b.habitat[lang]}</dd>
      </dl>
    </div>`).join('') : `<div class="empty">${t('noMatches')}</div>`);
}

/* ============ main map ============ */
let map = null, cadLayer = null, myLayer = null, commLayer = null, matrikelLayer = null;
function makeDot(color){
  return L.divIcon({className:'', iconSize:[16,16], iconAnchor:[8,8],
    html:`<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2.5px solid #fffdf7;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`});
}
function initMap(){
  setTimeout(() => {
    if (!map){
      map = L.map('map').setView([56.0, 10.5], 7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        {maxZoom:19, subdomains:'abcd', attribution:'© OpenStreetMap · © CARTO'}).addTo(map);
      matrikelLayer = L.layerGroup().addTo(map);
      myLayer = L.layerGroup().addTo(map);
      commLayer = L.layerGroup().addTo(map);
      document.getElementById('cadToggle').addEventListener('change', toggleCadastral);
      document.getElementById('commToggle').addEventListener('change', e => {
        if (e.target.checked) commLayer.addTo(map); else map.removeLayer(commLayer);
      });
      document.getElementById('matToggle').addEventListener('change', e => {
        if (e.target.checked) matrikelLayer.addTo(map); else map.removeLayer(matrikelLayer);
      });
      refreshMapMarkers();
    }
    map.invalidateSize();
  }, 60);
}
function refreshMapMarkers(){
  if (!map) return;
  myLayer.clearLayers(); commLayer.clearLayers();
  const popThumb = path => path
    ? `<br>${photoThumbHTML(path, '', 'pop-thumb').replace('class="pop-thumb"', 'class="pop-thumb" style="width:150px;border-radius:8px;margin-top:6px"')}`
    : '';
  sightings.forEach(s => {
    const b = birdById(s.bird_id); if (!b) return;
    L.marker([s.lat, s.lng], {icon: makeDot('#2d5a3d')}).addTo(myLayer)
      .bindPopup(`<div class="popup-bird">${b.name[lang]}</div>
        <div class="popup-sub"><i>${b.latin}</i><br>${fmtDate(s.seen_at)} · ${t('you')}</div>
        ${popThumb(s.photo_path)}`);
  });
  communityRows.forEach(c => {
    const b = birdById(c.bird_id); if (!b) return;
    L.marker([c.lat, c.lng], {icon: makeDot('#c2683f')}).addTo(commLayer)
      .bindPopup(`<div class="popup-bird">${b.name[lang]}</div>
        <div class="popup-sub"><i>${b.latin}</i><br>${fmtDate(c.seen_at)} · ${t('otherUser')}</div>
        ${popThumb(c.photo_path)}`);
  });
  renderMatrikelLayer();
}
/* draw clickable parcels that contain sightings, with per-parcel stats */
function renderMatrikelLayer(){
  if (!map || !matrikelLayer) return;
  matrikelLayer.clearLayers();
  const agg = {};
  const add = r => {
    if (!r.matrikel_id) return;
    const g = agg[r.matrikel_id] || (agg[r.matrikel_id] = {label:r.matrikel_label||r.matrikel_id, geo:null, total:0, species:new Set(), users:new Set()});
    g.total++; g.species.add(r.bird_id);
    if (r.user_id) g.users.add(r.user_id);
    if (!g.geo && r.matrikel_geojson){ try { g.geo = JSON.parse(r.matrikel_geojson); } catch(e){} }
  };
  sightings.forEach(s => add({matrikel_id:s.matrikel_id, matrikel_label:s.matrikel_label, matrikel_geojson:s.matrikel_geojson, bird_id:s.bird_id, user_id:s.user_id||user.id}));
  communityRows.forEach(add);
  Object.keys(agg).forEach(id => {
    const g = agg[id]; if (!g.geo) return;
    L.geoJSON(g.geo, {style:{color:'#2d5a3d', weight:2, fillColor:'#3f7a52', fillOpacity:.22}})
      .addTo(matrikelLayer)
      .on('click', () => openMatrikelDetail(id));
  });
}
function toggleCadastral(e){
  const token = store.get('dfToken','');
  if (e.target.checked){
    if (!token){ toast(t('tokenMissing')); e.target.checked = false; return; }
    cadLayer = L.tileLayer.wms('https://api.dataforsyningen.dk/wms/MatGaeldendeOgForeloebigWMS_DAF', {
      layers:'MatrikelSkel_Gaeldende,Centroide_Gaeldende', format:'image/png',
      transparent:'TRUE', version:'1.3.0',
      maxZoom:19, minZoom:13, token: token, attribution:'Matrikelkort © Dataforsyningen'
    }).addTo(map);
    if (map.getZoom() < 13) toast('Zoom ind for at se matrikler / zoom in to see parcels');
  } else if (cadLayer){ map.removeLayer(cadLayer); cadLayer = null; }
}
function centerOnMe(){
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => map.setView([p.coords.latitude, p.coords.longitude], 16),
    () => toast(t('locErr')), {enableHighAccuracy:true, timeout:10000});
}

/* ============ profile ============ */
function updateStats(){
  const el = document.getElementById('statSightings'); if (!el) return;
  el.textContent = sightings.length;
  document.getElementById('statSpecies').textContent = uniqueSpeciesSeen().length;
  document.getElementById('statBadges').textContent = Object.keys(unlockedBadges).length;
  document.getElementById('profName').value = profileName;
  document.getElementById('dfToken').value = store.get('dfToken','');
}
async function saveProfile(){
  profileName = document.getElementById('profName').value.trim();
  await db.from('profiles').upsert({ id: user.id, display_name: profileName });
  toast('✓');
}
function saveToken(){
  store.set('dfToken', document.getElementById('dfToken').value.trim()); toast('✓');
}

/* ============ toast ============ */
let toastTimer = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ============ init ============ */
applyLang();
setNow();
db.auth.getSession().then(({data}) => {
  user = data.session ? data.session.user : null;
  updateAuthUI();
  if (user){ loadCloudData(); showView('observations'); }
});
